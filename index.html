<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>异世救世录 - 从零开始的魔王讨伐与神之终焉</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚔️</text></svg>">
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Noto Sans SC', 'Microsoft YaHei', sans-serif;
            overflow: hidden;
        }

        /* 动态背景粒子 */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(65, 105, 225, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(138, 43, 226, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(255, 215, 0, 0.04) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        #game-container {
            position: relative;
            z-index: 1;
            border: 2px solid rgba(255, 215, 0, 0.3);
            border-radius: 12px;
            box-shadow:
                0 0 40px rgba(255, 215, 0, 0.1),
                0 0 80px rgba(65, 105, 225, 0.08),
                inset 0 0 30px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        /* 游戏容器发光边框动画 */
        #game-container::before {
            content: '';
            position: absolute;
            top: -2px; left: -2px; right: -2px; bottom: -2px;
            border-radius: 14px;
            background: linear-gradient(45deg,
                transparent 30%,
                rgba(255, 215, 0, 0.4) 50%,
                transparent 70%);
            background-size: 300% 300%;
            animation: borderGlow 6s ease-in-out infinite;
            z-index: -1;
            pointer-events: none;
        }

        @keyframes borderGlow {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        /* 加载提示 */
        #loading-screen {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #0a0a1a;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.8s ease;
        }

        #loading-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }

        #loading-screen h1 {
            font-size: 2.5rem;
            color: #FFD700;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
            margin-bottom: 30px;
            font-weight: 700;
            letter-spacing: 4px;
        }

        .loading-bar-outer {
            width: 300px;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
        }

        .loading-bar-inner {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #FFD700, #FF8C00);
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        #loading-screen p {
            margin-top: 15px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.85rem;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <div id="loading-screen">
        <h1>异世救世录</h1>
        <div class="loading-bar-outer">
            <div class="loading-bar-inner" id="loading-bar"></div>
        </div>
        <p>正在加载世界...</p>
    </div>
    <div id="game-container"></div>
    <script>
        // 加载进度模拟
        let loadProgress = 0;
        const loadInterval = setInterval(() => {
            loadProgress += Math.random() * 15 + 5;
            if (loadProgress >= 100) {
                loadProgress = 100;
                clearInterval(loadInterval);
                setTimeout(() => {
                    document.getElementById('loading-screen').classList.add('hidden');
                }, 500);
            }
            document.getElementById('loading-bar').style.width = loadProgress + '%';
        }, 200);
    </script>
    <script src="src/config/saveSystem.js"></script>
    <script src="src/data/story.js"></script>
    <script src="src/dialogue/DialogueManager.js"></script>
    <script src="src/scenes/BootScene.js"></script>
    <script src="src/scenes/PreloadScene.js"></script>
    <script src="src/scenes/MenuScene.js"></script>
    <script src="src/scenes/StoryScene.js"></script>
    <script src="src/scenes/GameScene.js"></script>
    <script src="src/scenes/EndingScene.js"></script>
    <script src="src/scenes/PauseScene.js"></script>
    <script src="src/scenes/GameOverScene.js"></script>
    <script src="src/scenes/EpilogueScene.js"></script>
    <script src="src/config/game.js"></script>
    <script src="src/main.js"></script>
</body>
</html>
